<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play vs Engine — KnightOS</title>
  <meta name="description" content="Play chess against the KnightOS AI engine at up to ~2000 ELO strength.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-page">

    <!-- Top bar -->
    <header class="topbar">
      <a href="index.html" class="topbar-logo">
        <span class="icon">♞</span>
        Knight<span>OS</span>
      </a>
      <div class="topbar-divider"></div>
      <span class="topbar-title">Play vs Engine</span>
      <div class="topbar-spacer"></div>
      <button class="btn btn-ghost btn-sm" id="btn-flip">Flip Board</button>
      <button class="btn btn-ghost btn-sm" id="btn-new">New Game</button>
    </header>

    <!-- Main layout -->
    <div class="game-layout">

      <!-- Board column -->
      <div class="flex flex-col gap-8" id="board-column">

        <!-- Opponent info -->
        <div class="player-info" id="player-black">
          <div class="player-avatar">♛</div>
          <div>
            <div class="player-name" id="engine-name">KnightOS Engine</div>
            <div class="player-elo" id="engine-elo">~2000 ELO</div>
          </div>
          <div class="clock" id="clock-black">∞</div>
        </div>

        <!-- Board -->
        <div class="board-wrapper">
          <div class="board-container" id="board-container"></div>
        </div>

        <!-- Player info -->
        <div class="player-info" id="player-white">
          <div class="player-avatar">♙</div>
          <div>
            <div class="player-name">You</div>
            <div class="player-elo" id="player-elo-label">Playing as White</div>
          </div>
          <div class="clock" id="clock-white">∞</div>
        </div>
      </div>

      <!-- Sidebar -->
      <aside class="sidebar">

        <!-- Difficulty -->
        <div class="panel" id="panel-difficulty">
          <div class="panel-title">Difficulty</div>
          <div class="difficulty-grid">
            <button class="diff-btn" id="diff-easy"   data-time="800"  data-depth="3">Easy</button>
            <button class="diff-btn active" id="diff-medium" data-time="1500" data-depth="null">Medium</button>
            <button class="diff-btn" id="diff-hard"   data-time="3000" data-depth="null">Hard</button>
          </div>
          <div class="mt-12">
            <label>Play as</label>
            <div class="difficulty-grid">
              <button class="diff-btn active" id="color-white" data-color="white">White</button>
              <button class="diff-btn" id="color-black" data-color="black">Black</button>
            </div>
          </div>
        </div>

        <!-- Engine status -->
        <div class="panel" id="panel-engine">
          <div class="panel-title">Engine</div>
          <div class="engine-thinking hidden" id="engine-thinking">
            <div class="thinking-pulse"></div>
            <span>Calculating...</span>
          </div>
          <div id="engine-stats">
            <div class="engine-stat"><span class="label">Depth</span><span class="value" id="stat-depth">—</span></div>
            <div class="engine-stat"><span class="label">Score</span><span class="value" id="stat-score">—</span></div>
            <div class="engine-stat"><span class="label">Nodes</span><span class="value" id="stat-nodes">—</span></div>
            <div class="engine-stat"><span class="label">Time</span><span class="value" id="stat-time">—</span></div>
          </div>
        </div>

        <!-- Score bar -->
        <div class="panel">
          <div class="panel-title">Evaluation</div>
          <div class="score-bar-wrapper">
            <span style="font-size:0.75rem;color:var(--text-muted)">B</span>
            <div class="score-bar">
              <div class="score-bar-fill" id="score-fill" style="width:50%"></div>
            </div>
            <span style="font-size:0.75rem;color:var(--text-muted)">W</span>
            <span class="score-value" id="score-value">0.0</span>
          </div>
        </div>

        <!-- Captured pieces -->
        <div class="panel">
          <div class="panel-title">Captured Pieces</div>
          <div class="captured-row" id="captured-white">
            <span class="muted text-xs">No captures yet</span>
          </div>
          <div style="height:8px"></div>
          <div class="captured-row" id="captured-black">
            <span class="muted text-xs">No captures yet</span>
          </div>
        </div>

        <!-- Move history -->
        <div class="panel">
          <div class="panel-title">Move History</div>
          <div class="move-history" id="move-history">
            <span class="muted text-xs">No moves yet</span>
          </div>
        </div>

      </aside>
    </div>
  </div>

  <!-- Game over overlay -->
  <div class="game-over-overlay" id="game-over-overlay">
    <div class="glass game-over-card animate-fade">
      <div style="font-size:3rem;margin-bottom:12px" id="game-over-icon">♟</div>
      <h2 id="game-over-title">Game Over</h2>
      <p id="game-over-msg">The game has ended.</p>
      <div class="game-over-buttons">
        <button class="btn btn-primary" id="btn-rematch">Rematch</button>
        <button class="btn btn-ghost"   id="btn-home">Home</button>
      </div>
    </div>
  </div>

  <script src="js/chess.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/board.js"></script>
  <script>
  'use strict';

  // ── State ──────────────────────────────────────────────────────────────
  let game       = new ChessGame();
  let chessBoard = null;
  let worker     = null;
  let playerColor = COLOR.WHITE;
  let engineTimeMs = 1500;
  let engineDepth  = null;
  let engineBusy   = false;
  let moveLog      = [];

  // Piece unicode for captured display
  const PIECE_UNICODE_ARR = ['','♙','♘','♗','♖','♕','♔','','','♟','♞','♝','♜','♛','♚'];
  const MATERIAL_VAL      = [0, 1, 3, 3, 5, 9, 0];

  // ── Init ───────────────────────────────────────────────────────────────
  function init() {
    const container = document.getElementById('board-container');
    chessBoard = new ChessBoard(container, {
      perspective: 'white',
      interactive: true,
      onMove: handlePlayerMove,
    });

    try {
      worker = new Worker('js/engine.worker.js');
      worker.onmessage = handleWorkerMsg;
    } catch (e) {
      // Fallback: run engine on main thread (for file:// protocol)
      worker = null;
    }

    startNewGame();
    bindUI();
  }

  function startNewGame() {
    game = new ChessGame();
    moveLog = [];
    engineBusy = false;
    chessBoard.setPosition(game);
    chessBoard.setLastMove(null);
    chessBoard.clearArrows();
    chessBoard.setInteractive(playerColor === game.sideToMove);
    updateUI();
    document.getElementById('game-over-overlay').classList.remove('visible');

    if (playerColor === COLOR.BLACK) {
      // Engine plays first as White
      requestEngineMove();
    }
  }

  // ── Move handling ──────────────────────────────────────────────────────
  function handlePlayerMove(move) {
    if (game.sideToMove !== playerColor) return;
    if (engineBusy) return;

    applyMove(move);

    if (!game.isGameOver()) {
      requestEngineMove();
    }
  }

  function applyMove(move) {
    game.makeMove(move);
    moveLog.push({ move, san: game.moveToSAN ? getPrevSAN(move) : '?' });
    chessBoard.setPosition(game);
    chessBoard.setLastMove(move);
    chessBoard.clearArrows();
    updateUI();
    if (game.isGameOver()) showGameOver();
  }

  // SAN was generated before the move was applied; we call it before makeMove above,
  // but chess.js generates SAN by temporarily applying the move internally.
  // Reconstruct a simple label if needed.
  function getPrevSAN(move) {
    // moveToSAN was computed before makeMove — we need a clone approach
    return game.moveToUCI ? game.moveToUCI(move) : '?';
  }

  function requestEngineMove() {
    if (game.isGameOver()) return;
    if (game.sideToMove === playerColor) return;

    engineBusy = true;
    chessBoard.setInteractive(false);
    document.getElementById('engine-thinking').classList.remove('hidden');

    const fen = game.toFEN();

    if (worker) {
      worker.postMessage({ type: 'search', fen, timeMs: engineTimeMs, depth: engineDepth });
    } else {
      // Main-thread fallback
      const eng = new ChessEngine();
      eng.getBestMove(game.clone(), {
        timeMs: engineTimeMs,
        depth: engineDepth,
        onProgress: info => updateEngineStats(info),
      }).then(result => handleEngineResult(result, fen));
    }
  }

  function handleWorkerMsg(e) {
    const { type, payload } = e.data;
    if (type === 'progress') updateEngineStats(payload);
    if (type === 'result')   handleEngineResult(payload, null);
  }

  function handleEngineResult(result, expectedFen) {
    engineBusy = false;
    document.getElementById('engine-thinking').classList.add('hidden');
    updateEngineStats(result);

    if (!result?.move) return;
    if (game.isGameOver()) return;

    const move = game.parseUCI(game.moveToUCI(result.move));
    if (!move) return;

    applyMove(move);

    if (!game.isGameOver()) {
      chessBoard.setInteractive(true);
    }
  }

  // ── UI updates ─────────────────────────────────────────────────────────
  function updateUI() {
    updateMoveHistory();
    updateCaptured();
    updateScore(0); // score reset; engine will update via onProgress
  }

  function updateEngineStats(info) {
    if (!info) return;
    document.getElementById('stat-depth').textContent = info.depth ?? '—';
    document.getElementById('stat-nodes').textContent = info.nodes ? formatNum(info.nodes) : '—';
    document.getElementById('stat-time').textContent  = info.timeMs ? info.timeMs + 'ms' : '—';

    if (info.score !== undefined) {
      updateScore(info.score);
    }
  }

  function updateScore(score) {
    // score is from engine's side-to-move perspective; convert to white perspective
    const whiteScore = game.sideToMove === COLOR.WHITE ? score : -score;
    const cp = Math.max(-1000, Math.min(1000, whiteScore));
    const pct = 50 + cp / 20;  // map ±1000cp to 0-100%

    document.getElementById('score-fill').style.width = Math.max(5, Math.min(95, pct)) + '%';
    const display = Math.abs(cp) >= 900 ? 'M' : (cp / 100).toFixed(1);
    document.getElementById('score-value').textContent = (cp > 0 ? '+' : '') + display;
    document.getElementById('stat-score').textContent  = (cp > 0 ? '+' : '') + (cp / 100).toFixed(2);
  }

  function updateMoveHistory() {
    const el = document.getElementById('move-history');
    const moves = game._history ?? [];
    if (moves.length === 0) {
      el.innerHTML = '<span class="muted text-xs">No moves yet</span>';
      return;
    }

    // Reconstruct SAN from history via UCI for display
    let html = '';
    const tmpGame = new ChessGame();
    const histMoves = moves.map(h => h.move);

    for (let i = 0; i < histMoves.length; i++) {
      const m = histMoves[i];
      const san = tmpGame.moveToSAN ? tmpGame.moveToSAN(m) : tmpGame.moveToUCI(m);
      if (i % 2 === 0) html += `<div class="move-row"><span class="move-num">${Math.floor(i/2)+1}.</span>`;
      html += `<span class="move-san${i === histMoves.length - 1 ? ' current' : ''}">${san}</span>`;
      if (i % 2 === 1) html += '</div>';
      tmpGame._applyMove(m);
    }
    if (histMoves.length % 2 === 1) html += '</div>';

    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
  }

  function updateCaptured() {
    const captured = { white: [], black: [] };
    const startCounts = [0,8,2,2,2,1,1,8,2,2,2,1,1]; // indexed by piece value

    const counts = new Array(15).fill(0);
    for (let sq = 0; sq < 64; sq++) {
      const p = game.board[sq];
      if (p) counts[p]++;
    }

    // White pieces captured by Black
    for (let t = 1; t <= 6; t++) {
      const start = t === 1 ? 8 : t === 4 ? 2 : t === 5 ? 1 : t === 6 ? 1 : 2;
      const remaining = counts[t];
      for (let n = 0; n < start - remaining; n++) captured.black.push(PIECE_UNICODE_ARR[t]);
    }
    // Black pieces captured by White
    for (let t = 9; t <= 14; t++) {
      const type = t - 8;
      const start = type === 1 ? 8 : type === 4 ? 2 : type === 5 ? 1 : type === 6 ? 1 : 2;
      const remaining = counts[t];
      for (let n = 0; n < start - remaining; n++) captured.white.push(PIECE_UNICODE_ARR[t]);
    }

    const renderRow = (id, pieces) => {
      const el = document.getElementById(id);
      if (pieces.length === 0) {
        el.innerHTML = '<span class="muted text-xs">No captures yet</span>';
      } else {
        el.innerHTML = pieces.map(p => `<span class="captured-piece">${p}</span>`).join('');
      }
    };
    renderRow('captured-white', captured.white);
    renderRow('captured-black', captured.black);
  }

  function showGameOver() {
    const result = game.getResult();
    const icons  = { '1-0': '🏆', '0-1': '🏆', '1/2-1/2': '🤝' };
    const titles = { '1-0': 'White Wins!', '0-1': 'Black Wins!', '1/2-1/2': 'Draw' };
    const msgs   = {
      '1-0': game.isCheckmate() ? 'Checkmate — White wins.' : 'White wins.',
      '0-1': game.isCheckmate() ? 'Checkmate — Black wins.' : 'Black wins.',
      '1/2-1/2': game.isStalemate() ? 'Stalemate — Draw.' : 'Draw by repetition or 50-move rule.',
    };

    document.getElementById('game-over-icon').textContent   = icons[result]  ?? '♟';
    document.getElementById('game-over-title').textContent  = titles[result] ?? result;
    document.getElementById('game-over-msg').textContent    = msgs[result]   ?? '';
    document.getElementById('game-over-overlay').classList.add('visible');
  }

  // ── Helpers ────────────────────────────────────────────────────────────
  function formatNum(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K';
    return n;
  }

  // ── UI bindings ────────────────────────────────────────────────────────
  function bindUI() {
    document.getElementById('btn-flip').addEventListener('click', () => chessBoard.flip());
    document.getElementById('btn-new').addEventListener('click', startNewGame);
    document.getElementById('btn-rematch').addEventListener('click', startNewGame);
    document.getElementById('btn-home').addEventListener('click', () => location.href = 'index.html');

    // Difficulty buttons
    document.querySelectorAll('.diff-btn[data-time]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn[data-time]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        engineTimeMs = parseInt(btn.dataset.time);
        const d = btn.dataset.depth;
        engineDepth = (d === 'null' || !d) ? null : parseInt(d);
      });
    });

    // Color buttons
    document.querySelectorAll('.diff-btn[data-color]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn[data-color]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        playerColor = btn.dataset.color === 'white' ? COLOR.WHITE : COLOR.BLACK;
        document.getElementById('player-elo-label').textContent = `Playing as ${btn.dataset.color === 'white' ? 'White' : 'Black'}`;
        startNewGame();
        if (playerColor === COLOR.BLACK) {
          chessBoard.flip();
        }
      });
    });
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
