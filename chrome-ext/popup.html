<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Aether Chess Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #171717;
      --border: #262626;
      --text: #ededed;
      --text-muted: #a3a3a3;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #10b981;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-text h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header-text .subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status-box {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    .status-box.active .status-indicator {
      background: var(--success);
      box-shadow: 0 0 6px rgba(16,185,129,0.6);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-box.active { border-color: rgba(16, 185, 129, 0.25); }

    /* ---- Mode Toggle ---- */
    .mode-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 3px;
      gap: 3px;
    }

    .mode-btn {
      flex: 1;
      padding: 6px 8px;
      border: none;
      border-radius: 5px;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      transition: background 0.15s, color 0.15s;
    }

    .mode-btn.active {
      background: var(--primary);
      color: #fff;
    }

    /* ---- Controls ---- */
    .control-group { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 6px;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      appearance: none;
      transition: border-color 0.2s;
    }

    select {
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a3a3a3' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 14px;
    }

    input[type="number"] {
      appearance: auto;
      -webkit-appearance: auto;
      cursor: default;
    }

    select:focus, input[type="number"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    select option { background: var(--surface); color: var(--text); }

    /* ---- Buttons ---- */
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn:hover { background: var(--primary-hover); }
    .btn:active { transform: scale(0.98); }

    .btn.stop { display: none; background: var(--danger); }
    .btn.stop:hover { background: var(--danger-hover); }

    /* ---- Stats Panel ---- */
    .stats-panel {
      margin-top: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .stats-header {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 8px 12px 6px;
      border-bottom: 1px solid var(--border);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }

    .stat-cell {
      background: var(--surface);
      padding: 8px 12px;
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .stat-value.positive { color: var(--success); }
    .stat-value.negative { color: var(--danger); }
    .stat-value.mate { color: var(--warning); }

    /* ---- Footer ---- */
    .hw-info {
      text-align: center;
      margin-top: 12px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">♞</div>
    <div class="header-text">
      <h2>Aether Engine</h2>
      <div class="subtitle">WASM Local Analysis</div>
    </div>
  </div>

  <div class="status-box inactive" id="status-box">
    <div class="status-indicator"></div>
    <span id="status-text">System Standby</span>
  </div>

  <!-- Engine Mode -->
  <div class="control-group">
    <label>Engine Mode</label>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-mode-analysis">🏹 Analysis Only</button>
      <button class="mode-btn" id="btn-mode-autoplay">🤖 Auto-Play</button>
    </div>
  </div>

  <!-- ELO -->
  <div class="control-group">
    <label>Engine Strength (ELO)</label>
    <select id="elo-select">
      <option value="400">400 (Beginner)</option>
      <option value="1200">1200 (Intermediate)</option>
      <option value="1600">1600 (Advanced)</option>
      <option value="1800">1800 (Expert)</option>
      <option value="2000">2000 (Master)</option>
      <option value="2500">2500 (Grandmaster)</option>
      <option value="3000" selected>3000 (Super GM)</option>
      <option value="3500">3500+ (God Mode)</option>
    </select>
  </div>

  <!-- CPU -->
  <div class="control-group">
    <label>CPU Allocation</label>
    <select id="cpu-select">
      <option value="eco">Eco Mode (1 Core)</option>
      <option value="balanced" selected>Balanced (50% Cores)</option>
      <option value="max">Max Performance</option>
    </select>
  </div>

  <!-- Hash -->
  <div class="control-group">
    <label>Transposition Table Memory</label>
    <select id="hashSize">
      <option value="16">16 MB</option>
      <option value="64">64 MB</option>
      <option value="128" selected>128 MB</option>
      <option value="256">256 MB</option>
    </select>
  </div>

  <!-- Increment -->
  <div class="control-group">
    <label>Time Increment (seconds)</label>
    <input type="number" id="increment" min="0" max="60" value="0" step="1">
  </div>

  <button class="btn" id="btn-start">Start Engine</button>
  <button class="btn stop" id="btn-stop">Stop Engine</button>

  <!-- Analysis Stats -->
  <div class="stats-panel">
    <div class="stats-header">Last Analysis</div>
    <div class="stats-grid">
      <div class="stat-cell">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="stat-score">—</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Depth</div>
        <div class="stat-value" id="stat-depth">—</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Nodes</div>
        <div class="stat-value" id="stat-nodes">—</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Time</div>
        <div class="stat-value" id="stat-time">—</div>
      </div>
    </div>
  </div>

  <div class="hw-info" id="hw-info">Detecting Hardware...</div>

  <script src="popup.js"></script>
</body>
</html>
