<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Aether Chess Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #171717;
      --border: #262626;
      --text: #ededed;
      --text-muted: #a3a3a3;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #10b981;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-text h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header-text .subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status-box {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-box.active .status-indicator {
      background: var(--success);
    }

    .status-box.active {
      border-color: rgba(16, 185, 129, 0.2);
    }

    .control-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a3a3a3' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 14px;
      transition: border-color 0.2s;
    }

    select:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    select option {
      background: var(--surface);
      color: var(--text);
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
      transition: background 0.2s;
      margin-top: 8px;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn.stop {
      display: none;
      background: var(--danger);
    }

    .btn.stop:hover {
      background: var(--danger-hover);
    }

    .hw-info {
      text-align: center;
      margin-top: 16px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">♞</div>
    <div class="header-text">
      <h2>Aether Engine</h2>
      <div class="subtitle">WASM Local Analysis</div>
    </div>
  </div>

  <div class="status-box inactive" id="status-box">
    <div class="status-indicator"></div>
    <span id="status-text">System Standby</span>
  </div>

  <div class="control-group">
    <label>Engine Strength (ELO)</label>
    <select id="elo-select">
      <option value="400">400 (Beginner)</option>
      <option value="1200">1200 (Intermediate)</option>
      <option value="1600">1600 (Advanced)</option>
      <option value="1800">1800 (Expert)</option>
      <option value="2000">2000 (Master)</option>
      <option value="2500">2500 (Grandmaster)</option>
      <option value="3000" selected>3000 (Super GM)</option>
      <option value="3500">3500+ (God Mode)</option>
    </select>
  </div>

  <div class="control-group">
    <label>CPU Allocation</label>
    <select id="cpu-select">
      <option value="eco">Eco Mode (1 Core)</option>
      <option value="balanced" selected>Balanced (50% Cores)</option>
      <option value="max">Max Performance</option>
    </select>
  </div>

  <div class="control-group">
    <label>Transposition Table Memory</label>
    <select id="hashSize">
      <option value="16">16 MB</option>
      <option value="64">64 MB</option>
      <option value="128" selected>128 MB</option>
      <option value="256">256 MB</option>
    </select>
  </div>

  <button class="btn" id="btn-start">Start Engine</button>
  <button class="btn stop" id="btn-stop">Stop Engine</button>

  <div class="hw-info" id="hw-info">Detecting Hardware...</div>

  <script src="popup.js"></script>
</body>
</html>
